Rechercher des produits par nom et/ou catégorie.
---
tags:
  - Produits
security:
  - Bearer: []
parameters:
  - name: nom
    in: query
    type: string
    required: false
    description: Filtre sur le nom du produit (insensible à la casse)
    example: doliprane
  - name: categorie
    in: query
    type: string
    required: false
    description: Filtre sur la catégorie (insensible à la casse)
    example: Médicament OTC
responses:
  200:
    description: Liste des produits correspondants
    schema:
      type: array
      items:
        properties:
          id:
            type: integer
          nom:
            type: string
          categorie:
            type: string
          prix:
            type: number
          quantite_stock:
            type: integer
  401:
    description: Token manquant ou invalide
  404:
    description: Aucun produit ne correspond aux critères
