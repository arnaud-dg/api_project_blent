name: CI/CD — Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # Job 1 : construction et publication de l'image
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # nécessaire pour pousser sur ghcr.io

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token généré automatiquement par GitHub

      - name: Construction et publication de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/parashop-api:latest

  # Job 2 : déploiement sur la VM via SSH
  deploy:
    name: Deploy on VM
    needs: build             # attend la fin du job build
    runs-on: ubuntu-latest
    env:
      VM_HOST: ${{ secrets.VM_HOST }}  # exposé en variable d'env pour pouvoir tester sa présence

    steps:
      - name: Déploiement via SSH
        if: env.VM_HOST != ''          # ignoré si le secret n'est pas encore renseigné
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Récupération de la nouvelle image
            docker pull ghcr.io/${{ github.repository_owner }}/parashop-api:latest

            # Arrêt et suppression du conteneur existant (sans erreur si absent)
            docker stop parashop-api || true
            docker rm   parashop-api || true

            # Démarrage du nouveau conteneur
            docker run -d \
              --name parashop-api \
              --restart unless-stopped \
              -p 5000:5000 \
              -v /opt/parashop/data:/app/data \
              -e SECRET_JWT_TOKEN=${{ secrets.SECRET_JWT_TOKEN }} \
              -e ADMIN_SECRET_TOKEN=${{ secrets.ADMIN_SECRET_TOKEN }} \
              ghcr.io/${{ github.repository_owner }}/parashop-api:latest
